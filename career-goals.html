<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Career-goals</title>
    </head>
    <body>
        <h1>Career-Goals</h1>
        <nav></nav>
        <main>Container for the document's primary content
            <img src="/my-image.jpg">

            <audio><source src="/the-westerlies-antimatter.mp3" autoplay controls loop></audio>
            <video controls width="600">
                <source src="">
            </video>
            <form action="https://example.org" method="POST">
                <p>
                    <label for="first">First Name:</label>
                    <input type="text" name="first" id="first" placeholder="first name" required>
                </p>
                <p>
                    <label for="last">LastName:</label>
                    <input type="text" name="last" id="last" placeholder="last name" required>
                </p>
                <p>
                    <label for="company-name">Company Name:</label>
                    <input type="text" name="company-name" id="company-name" placeholder="company name" required>
                </p>
                <p>
                    <label for="email">Email:</label>
                    <input type="email" placeholder="email address" required>
                </p>
                <p>
                    <label for="telephone-number">Telephone Number:</label>
                    <input type="tel" placeholder="555-555-5555" required>
                </p>
                <p>
                    <label for="message">Message:</label>
                    <input type="text" name="message" id="message" placeholder="message" required>
                </p>
                <p>
                    <label for="best-contact-time">Best Contact Time</label>
                    <input type="radio" name="best-contact-time" value="AM" id="AM">
                    <input type="radio" name="best-contact-time" value="PM" id="PM">
                    <input type="radio" name="best-contact-time" value="Anytime" id="Anytime">
                </p>
                
                <select for="preferred-contact" required>
                    <option value="phone">phone</option>
                    <option value="email">email</option>
                    <option value="text">text</option>
                </select>
                <input type="submit" value="Submit">
            </form>
        </main>

        <footer>Container for the content descriptive information about the webpage like author, copyright, or date modified</footer>
    </body>
</html>
